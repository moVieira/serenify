<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sua Saúde - IA Health</title>
    <!-- Usando a fonte Inter para um visual moderno e premium -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Elementos de fundo em forma de redemoinho / flores para compor o visual -->
    <div class="background-elements">
        <img src="assets/swirl-top.png" alt="" class="deco top-right">
        <img src="assets/bg-flower.png" alt="" class="deco bottom-right">
        <img src="assets/swirl-bottom.png" alt="" class="deco bottom-left">
    </div>

    <main class="container">
        <header class="hero-text">
            <h1>Seu corpo fala.<br>Você está ouvindo?</h1>
        </header>

        <!-- Container do vaso de planta -->
        <div class="plant-container">
            <img src="assets/plant.png" alt="Planta brilhante" class="plant-image">
            <div class="glow-effect"></div>
        </div>

        <div class="action-area">
            <p class="subtitle">Clique e descubra</p>
            <button class="discover-btn" id="discoverBtn" aria-label="Descobrir">
                <span class="dot"></span>
            </button>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
